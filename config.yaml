# Border Risk Escalation Model Configuration

# Data Sources
data_sources:
  acled:
    enabled: true
    api_url: "https://api.acleddata.com/api/v1/events"
    countries: ["Thailand", "Cambodia"]
    event_types: ["Battles", "Violence against civilians", "Strategic developments"]
    
  ucdp:
    enabled: true
    base_url: "https://ucdp.uu.se/api"
    datasets: ["battle_deaths", "organized_violence"]
    
  osm:
    enabled: true
    regions: ["Thailand", "Cambodia"]
    
  satellite:
    enabled: false
    provider: "earth-engine"
    satellites: ["Sentinel-2", "Landsat-8"]

# Geospatial Settings
geospatial:
  border_buffer_km: 50  # Analysis buffer around border
  grid_cell_size_km: 5  # For risk scoring grid
  crs: "EPSG:4326"  # WGS84
  
# Bayesian Network Configuration
bayesian_network:
  structure_learning: false  # Use predefined structure
  structure_type: "expert"   # expert, data-driven, hybrid
  
  nodes:
    - name: "incident_frequency"
      description: "Frequency of armed clashes in region"
      states: ["low", "medium", "high"]
      
    - name: "economic_stress"
      description: "Economic hardship indicators"
      states: ["low", "medium", "high"]
      
    - name: "population_density"
      description: "Population concentration"
      states: ["sparse", "moderate", "dense"]
      
    - name: "troop_concentration"
      description: "Military presence and deployments"
      states: ["low", "medium", "high"]
      
    - name: "border_activity"
      description: "Cross-border movement and trade"
      states: ["low", "medium", "high"]
      
    - name: "regional_stability"
      description: "Overall regional stability index"
      states: ["stable", "unstable", "crisis"]
      
    - name: "risk_escalation"
      description: "Probability of escalation"
      states: ["low", "medium", "high"]
  
  edges:
    - ["incident_frequency", "risk_escalation"]
    - ["economic_stress", "regional_stability"]
    - ["troop_concentration", "risk_escalation"]
    - ["population_density", "regional_stability"]
    - ["border_activity", "regional_stability"]
    - ["regional_stability", "risk_escalation"]

# Risk Scoring
risk_scoring:
  method: "bayesian_inference"
  normalization: "minmax"  # minmax or zscore
  thresholds:
    low: 0.33
    medium: 0.67
    high: 1.0

# Visualization
visualization:
  map_library: "folium"
  color_scheme: "RdYlGn_r"  # Red-Yellow-Green reversed
  base_map: "OpenStreetMap"
  output_format: "html"
  update_frequency: "daily"

# Database
database:
  host: "localhost"
  port: 5432
  database: "border_risk_db"
  user: "postgres"
  geometry_type: "PostGIS"

# Logging
logging:
  level: "INFO"
  file: "logs/border_risk.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"